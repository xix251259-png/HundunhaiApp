name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.4

      - name: Prepare project
        run: |
          mkdir -p app/src/main/java/com/hundunhai/setting
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/color
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          [ -f build.gradle ] && mv build.gradle app/build.gradle
          [ -f settings.gradle ] && mv settings.gradle .
          [ -f gradle.properties ] && mv gradle.properties .
          [ -f proguard-rules.pro ] && mv proguard-rules.pro app/
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
          [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/hundunhai/setting/
          [ -f SettingsActivity.java ] && mv SettingsActivity.java app/src/main/java/com/hundunhai/setting/
          [ -f ContentManagerActivity.java ] && mv ContentManagerActivity.java app/src/main/java/com/hundunhai/setting/
          [ -f index.html ] && mv index.html app/src/main/assets/
          [ -f strings.xml ] && mv strings.xml app/src/main/res/values/
          [ -f colors.xml ] && mv colors.xml app/src/main/res/values/
          [ -f themes.xml ] && mv themes.xml app/src/main/res/values/
          [ -f network_security_config.xml ] && mv network_security_config.xml app/src/main/res/xml/
          [ -f ic_home.xml ] && mv ic_home.xml app/src/main/res/drawable/
          [ -f ic_toc.xml ] && mv ic_toc.xml app/src/main/res/drawable/
          [ -f ic_search.xml ] && mv ic_search.xml app/src/main/res/drawable/
          [ -f ic_settings.xml ] && mv ic_settings.xml app/src/main/res/drawable/
          [ -f ic_launcher_foreground.xml ] && mv ic_launcher_foreground.xml app/src/main/res/drawable/
          [ -f ic_launcher.xml ] && mv ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/
          [ -f ic_launcher_round.xml ] && mv ic_launcher_round.xml app/src/main/res/mipmap-anydpi-v26/
          [ -f bottom_nav_color.xml ] && mv bottom_nav_color.xml app/src/main/res/color/

          cat > build.gradle << 'ENDOFFILE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          ENDOFFILE

          cat > settings.gradle << 'ENDOFFILE'
          include ':app'
          rootProject.name = "HundunhaiApp"
          ENDOFFILE

          cat > gradle.properties << 'ENDOFFILE'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          ENDOFFILE

          find . -type f | head -60

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
